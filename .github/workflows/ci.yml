name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  NO_MKDOCS_2_WARNING: "1"

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Validate curated atom states
        run: python scripts/build_atom_states.py --check

      - name: Check bundled basis data
        run: python scripts/check_basis_bundles.py

      - name: Inspect active SCF build plan
        run: python scripts/compute_wavefunctions.py --list

      - name: Inspect active profile datasets
        run: python scripts/extract_profiles.py --list

      - name: Run tests
        run: pytest -q

  installed-wheel:
    name: Installed wheel smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Run installed-wheel smoke test
        run: |
          python -m pip install --upgrade pip
          python scripts/smoke_installed_wheel.py

  docs:
    name: Documentation build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install documentation tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs]"

      - name: Build MkDocs site
        run: mkdocs build --strict
