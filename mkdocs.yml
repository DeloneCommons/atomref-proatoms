site_name: atomref-proatoms
site_description: Reproducible spherical atomic and ionic proatomic radial-density datasets
repo_url: https://github.com/DeloneCommons/atomref-proatoms
edit_uri: edit/main/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

plugins:
  - search
  - mkdocs-jupyter:
      include_source: true
      execute: false

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Overview: index.md
  - Scientific model: theory.md
  - Data products: data.md
  - Input data: inputs.md
  - State policy: state_policy.md
  - Workflow: workflow.md
  - How it works:
      - Notebook guide: notebooks/README.md
      - Release artifact inspection: notebooks/proatomic_profiles_v1.ipynb
      - Sphericalization demo: notebooks/spherical_vs_post_average_demo.ipynb
  - Attribution:
      - License: license.md
      - AI assistance note: ai_note.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
