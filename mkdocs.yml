site_name: atomref-proatoms
site_description: Reproducible spherical atomic and ionic proatomic radial-density datasets
site_url: https://delonecommons.github.io/atomref-proatoms/
repo_url: https://github.com/DeloneCommons/atomref-proatoms
edit_uri: edit/main/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.follow
    - content.code.copy

plugins:
  - search
  - mkdocs-jupyter:
      include_source: true
      execute: false

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Start here: index.md
  - Scientific note:
      - Introduction: introduction.md
      - Theory: theory.md
      - Methods: methods.md
      - Results: results.md
      - Discussion: discussion.md
      - Conclusions: conclusions.md
  - Generator manual:
      - Overview and quick start: generator/index.md
      - How-to guide: generator/howto.md
      - CLI reference: generator/cli.md
      - Python scripting: generator/scripting.md
      - Examples: generator/examples.md
  - Data and scientific reference:
      - Data products: data.md
      - Input data: inputs.md
      - State policy details: state_policy.md
      - Notebook guide: notebooks/README.md
      - Profile-table inspection: notebooks/proatomic_profiles.ipynb
      - Sphericalization demo: notebooks/spherical_vs_post_average_demo.ipynb
      - Multiwfn WFN validation: notebooks/multiwfn_wfn_plane_validation.ipynb
  - Developer and maintainer reference:
      - Python API: api.md
      - Workflow and validation: workflow.md
      - Citation, release, and reuse: other.md
  - Project policies:
      - License: license.md
      - AI assistance note: ai_note.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
