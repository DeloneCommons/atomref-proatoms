schema_version: atomref.proatoms.profile_datasets.v1
profile_data_version: 1.0.0

defaults:
  density_model: self_consistent_fractional_occupation_spherical_uks
  engine: pyscf
  expected_engine_version: 2.13.1
  scf_type: UKS
  xc: PBE0
  relativity: sf-X2C-1e
  spherical_basis: true
  conv_tol: 1.0e-9
  max_cycle: 100
  grid_level: 4

profile_grid:
  type: log
  r_min_bohr: 1.0e-6
  r_max_bohr: 60.0
  n: 1200

qa_grid:
  type: gauss_legendre_log_r
  r_min_bohr: 1.0e-7
  r_max_bohr: 120.0
  n: 400
  angular_points: 110

cutoffs_e_bohr3:
  - 0.003
  - 0.001
  - 0.0001

datasets:
  - dataset_id: pbe0_sfx2c_x2cqzvpall_h-rn_spherical_v1
    role: primary_neutral_h_rn
    basis_id: x2c-QZVPall
    coverage_label: H-Rn neutral atoms
    z_intervals: [[1, 86]]
    include_charges: neutral_only
    include_state_roles: [reference, reference_uncertain]
    diffuse: false

  - dataset_id: pbe0_sfx2c_dyallv4z_h-lr_spherical_v1
    role: primary_neutral_h_lr
    basis_id: dyall-v4z
    coverage_label: H-Lr neutral atoms
    z_intervals: [[1, 103]]
    include_charges: neutral_only
    include_state_roles: [reference, reference_uncertain]
    diffuse: false
