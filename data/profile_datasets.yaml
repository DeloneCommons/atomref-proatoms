schema_version: atomref.proatoms.profile_datasets.v1
profile_data_version: 2.0.0

defaults:
  density_model: self_consistent_fractional_occupation_spherical_uks
  engine: pyscf
  expected_engine_version: 2.13.1
  scf_type: UKS
  xc: PBE0
  relativity: sf-X2C-1e
  spherical_basis: true
  conv_tol: 1.0e-9
  max_cycle: 300
  diis_space: 12
  diis_start_cycle: 1
  grid_level: 4

profile_grid:
  type: log
  r_min_bohr: 1.0e-6
  r_max_bohr: 60.0
  n: 1200

qa_grid:
  type: gauss_legendre_log_r
  r_min_bohr: 1.0e-7
  r_max_bohr: 120.0
  n: 400
  angular_points: 110

cutoffs_e_bohr3:
  - 0.003
  - 0.001
  - 0.0001

state_role_sets:
  all_curated_v2:
    - reference
    - reference_uncertain
    - bound_experimental
    - bound_provisional
    - diagnostic_theory
    - formal_monoanion
    - formal_multianion
  anions_v2:
    - bound_experimental
    - bound_provisional
    - formal_monoanion
    - formal_multianion

datasets:
  - dataset_id: pbe0_sfx2c_x2cqzvpall_h-rn_spherical_v2
    role: primary_h_rn_all_curated_states
    basis_id: x2c-QZVPall
    coverage_label: H-Rn all curated v2 states
    z_intervals: [[1, 86]]
    include_charges: all
    include_state_roles:
      - reference
      - reference_uncertain
      - bound_experimental
      - bound_provisional
      - diagnostic_theory
      - formal_monoanion
      - formal_multianion
    diffuse: false

  - dataset_id: pbe0_sfx2c_dyallv4z_h-lr_spherical_v2
    role: primary_h_lr_all_curated_states
    basis_id: dyall-v4z
    coverage_label: H-Lr all curated v2 states
    z_intervals: [[1, 103]]
    include_charges: all
    include_state_roles:
      - reference
      - reference_uncertain
      - bound_experimental
      - bound_provisional
      - diagnostic_theory
      - formal_monoanion
      - formal_multianion
    diffuse: false

  - dataset_id: pbe0_sfx2c_x2cqzvpalls_h-rn_anions_spherical_v2
    role: anion_sensitivity_h_rn
    basis_id: x2c-QZVPall-s
    coverage_label: H-Rn anions with x2c-QZVPall-s
    z_intervals: [[1, 86]]
    include_charges: negative_only
    include_state_roles:
      - bound_experimental
      - bound_provisional
      - formal_monoanion
      - formal_multianion
    diffuse: true

  - dataset_id: pbe0_sfx2c_dyallav4z_h-ba_hf-ra_anions_spherical_v2
    role: anion_sensitivity_available_dyall_av4z
    basis_id: dyall-av4z
    coverage_label: H-Ba and Hf-Ra anions with dyall-av4z; seventh-period monoanions excluded from diffuse branch
    z_intervals: [[1, 56], [72, 88]]
    include_charges: negative_only
    include_state_roles:
      - bound_experimental
      - bound_provisional
      - formal_monoanion
      - formal_multianion
    exclude_symbols:
      - Fr
      - Ra
    diffuse: true
